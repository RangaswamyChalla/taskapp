# Full-stack production deployment
# ======================================================
version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: taskapp_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-taskapp}
      POSTGRES_USER:     ${POSTGRES_USER:-appuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-appuser} -d ${POSTGRES_DB:-taskapp}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks: [internal]

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: taskapp_api
    restart: unless-stopped
    environment:
      NODE_ENV:     production
      PORT:         3001
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET:   ${JWT_SECRET:?required}
      FRONTEND_URL: ${FRONTEND_URL:-https://yourdomain.com}
    depends_on:
      postgres: { condition: service_healthy }
    expose: ["3001"]
    networks: [internal]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-/api}
    container_name: taskapp_web
    restart: unless-stopped
    expose: ["80"]
    depends_on:
      backend: { condition: service_healthy }
    networks: [internal]

  nginx:
    image: nginx:1.25-alpine
    container_name: taskapp_proxy
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    ports: ["80:80", "443:443"]
    depends_on: [frontend, backend]
    networks: [internal, external]

volumes:
  pgdata:
    driver: local

networks:
  internal: { driver: bridge, internal: true }
  external: { driver: bridge }